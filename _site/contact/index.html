<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Contact | Joshua Kannappilly</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e293b;
            --accent: #3b82f6;
            --bg: #fafafa;
            --text: #0f172a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --card-bg: #ffffff;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 1rem 0;
        }

        nav .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .logo {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--primary);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav a {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        /* Mobile Menu Toggle */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 2px;
            background: var(--primary);
            transition: 0.3s;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        section {
            padding: 6rem 0;
            opacity: 0;
            animation: fadeIn 0.8s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* Hero Section */
        #home {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding-top: 80px;
        }

        .hero-content {
            max-width: 800px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        .subheading {
            font-size: 1.3rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .supporting-text {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.875rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-block;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
        }

        .btn-secondary:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
        }

        /* Quick Highlights */
        .highlights {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 4rem;
        }

        .highlight-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .highlight-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .highlight-card h3 {
            color: var(--primary);
            margin-bottom: 0.75rem;
            font-size: 1.3rem;
        }

        .highlight-card p {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Section Headers */
        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-header h2 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .section-header p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Projects */
        .projects-grid {
            display: grid;
            gap: 3rem;
        }

        .project-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2.5rem;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .project-card:hover {
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        }

        .project-header {
            margin-bottom: 1.5rem;
        }

        .project-header h3 {
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 0.75rem;
        }

        .project-summary {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        .project-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .tag {
            background: #eff6ff;
            color: var(--accent);
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .project-section {
            margin-bottom: 1.5rem;
        }

        .project-section h4 {
            color: var(--primary);
            margin-bottom: 0.75rem;
            font-size: 1.1rem;
        }

        .project-section p, .project-section ul {
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .project-section ul {
            list-style: none;
            padding-left: 0;
        }

        .project-section li {
            margin-bottom: 0.75rem;
            padding-left: 1.5rem;
            position: relative;
        }

        .project-section li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: bold;
        }

        .tech-stack {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 8px;
            font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 0.9rem;
            color: var(--primary);
        }

        /* Now */
        .now-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
        }

        .now-category {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .now-category:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.2);
        }

        .now-category-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .now-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 8px;
            color: var(--accent);
        }

        .now-icon svg {
            width: 24px;
            height: 24px;
        }

        .now-category h5 {
            font-size: 1.4rem;
            color: var(--text);
            margin: 0;
            font-weight: 600;
        }

        .now-category hr {
            border: none;
            border-top: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        .now-category ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .now-category li {
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.7;
            font-size: 1rem;
            padding-left: 1.5rem;
            position: relative;
        }

        .now-category li:before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .now-category li strong {
            color: var(--text);
            font-weight: 600;
        }

        .last-updated {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-style: italic;
            text-align: center;
        }

        /* Skills */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .skill-category {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .skill-category h3 {
            color: var(--primary);
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }

        .skill-category p {
            color: var(--text-secondary);
            line-height: 1.8;
        }

        /* About */
        .about-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .about-content h3 {
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
            text-align: center;
            font-style: italic;
        }

        .about-content p {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }

        .looking-for {
            background: #f0f9ff;
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            margin-top: 2rem;
        }

        .looking-for strong {
            color: var(--primary);
            display: block;
            margin-bottom: 0.5rem;
        }

        /* Contact */
        /* Contact Page - Modern Minimal (Aryan-inspired) */
        #contact {
            padding: 10rem 2rem 6rem;
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact-simple {
            max-width: 720px;
            width: 100%;
            background: var(--bg-secondary);
            padding: 3rem 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .contact-intro {
            font-size: 1.2rem;
            color: var(--text-primary);
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        /* Links */
        .contact-links {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .contact-links li {
            margin-bottom: 1.25rem;
        }

        /* Remove bullet, replace with cleaner style */
        .contact-links li:before {
            content: "";
            display: none;
        }

        /* Link styling */
        .contact-links a {
            display: inline-block;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 500;
            text-decoration: none;
            position: relative;
            transition: all 0.25s ease;
        }

        /* Underline animation */
        .contact-links a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -3px;
            width: 0%;
            height: 2px;
            background: var(--accent);
            transition: width 0.25s ease;
        }

        .contact-links a:hover {
            color: var(--accent);
            transform: translateX(4px);
        }

        .contact-links a:hover::after {
            width: 100%;
        }

        .contact-links a {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 500;
            text-decoration: none;
            position: relative;
            transition: all 0.25s ease;
        }

        .contact-links i {
            font-size: 1.1rem;
            color: var(--accent);
            transition: transform 0.2s ease;
        }

        .contact-links a:hover i {
            transform: scale(1.1);
        }
        /* Footer */
        footer {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 2rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            nav ul {
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: white;
                flex-direction: column;
                padding: 1rem 0;
                border-bottom: 1px solid var(--border);
                display: none;
            }

            nav ul.active {
                display: flex;
            }

            h1 {
                font-size: 2.5rem;
            }

            .subheading {
                font-size: 1.1rem;
            }

            section {
                padding: 4rem 0;
            }

            .section-header h2 {
                font-size: 2rem;
            }

            .cta-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                text-align: center;
            }
        }

        /* Container for the buttons at the bottom of the card */
        .project-links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        /* The Apple-style Outline Button */
        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-1px);
        }


    </style>
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo">Joshua Kannappilly</div>
            <ul id="nav-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/projects">Projects</a></li>
                <li><a href="/now">Now</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section id="contact">
    <div class="contact-simple">
        <p class="contact-intro">
            If you'd like to reach out about projects, internships, research opportunities, or ideas, feel free to contact me.
        </p>

        <ul class="contact-links">
            <li>
                <a href="mailto:jkannapp@nd.edu">
                    <i class="fas fa-envelope"></i>
                    jkannapp@nd.edu
                </a>
            </li>
            <li>
                <a href="https://www.linkedin.com/in/joshua-kannappilly" target="_blank">
                    <i class="fab fa-linkedin"></i>
                    LinkedIn
                </a>
            </li>
        </ul>
    </div>
</section>

    </main>

    <footer>
        <p>&copy; 2026 Joshua Kannappilly</p>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('nav-menu').classList.toggle('active');
        }
    </script>
</body>
</html>
